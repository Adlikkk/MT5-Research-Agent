name: Bug report
description: Report a problem with the desktop app or CLI
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. This tool is Strategy Tester only — please do not
        include broker account numbers, credentials, or API keys.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app / run `mt5-research-agent ...`
        2. ...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - Desktop app
        - CLI
        - Installer
        - Both
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: From `mt5-research-agent version` or the app's Settings → Updates.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: "Windows 10 22H2 / Windows 11 23H2"
  - type: textarea
    id: logs
    attributes:
      label: Logs / diagnostics
      description: "Output of `mt5-research-agent doctor --json`, or relevant log lines. Redact private paths."
      render: text
