name: Feature request
description: Suggest an improvement (Strategy Tester research scope only)
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        This project is intentionally scoped to **Strategy Tester research**. It
        will never add live trading, order placement, or Buy/Sell automation —
        please keep suggestions within the research/backtesting scope.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop UI
        - Research workflow
        - Optimizer
        - EA Lab
        - Reports / Leaderboard
        - CLI / API / MCP
        - Installer / packaging
        - Docs
    validations:
      required: true
