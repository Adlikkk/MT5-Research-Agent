name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Ruff
        run: ruff check .

  tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Pytest
        run: python -m pytest

  typecheck:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e .[dev]
      - name: Mypy
        run: mypy mt5_research_agent

  ui-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install UI deps
        working-directory: ui
        run: npm ci
      - name: Typecheck UI
        working-directory: ui
        run: npm run typecheck
      - name: Build UI
        working-directory: ui
        run: npm run build
